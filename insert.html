<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 사용자 등록 ✨</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3ecf8e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        button:hover {
            background-color: #34b379;
        }

        button.close-btn {
            background-color: #6b7280;
            margin-top: 0.5rem;
        }

        button.close-btn:hover {
            background-color: #4b5563;
        }

        .error {
            color: #e74c3c;
            margin-top: 1rem;
            display: none;
            font-weight: bold;
        }

        .success {
            color: #3ecf8e;
            margin-top: 1rem;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>➕ 새 사용자 등록</h1>
        <p style="color: #666; margin-bottom: 20px; font-size: 14px;">빈 순번이 있으면 자동으로 채워지고,<br>없으면 마지막 다음 번호로 등록됩니다.</p>

        <div class="input-group">
            <label for="nameInput">이름 <span style="color:red">*</span></label>
            <input type="text" id="nameInput" placeholder="이름을 입력하세요">
        </div>

        <div class="input-group">
            <label for="phoneInput">전화번호</label>
            <input type="text" id="phoneInput" placeholder="010-0000-0000">
        </div>

        <button onclick="registerUser()">등록하기</button>
        <button onclick="window.close()" class="close-btn">창 닫기</button>

        <div id="msgArea" class="error"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mizzulcysfmxfjecrnaw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1penp1bGN5c2ZteGZqZWNybmF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MzkyNjEsImV4cCI6MjA4NzAxNTI2MX0.Khh2uKTC2hAMizE4QLj8X648J1zIu0OqS1p53hIhjkE';

        async function registerUser() {
            const nameInput = document.getElementById('nameInput');
            const phoneInput = document.getElementById('phoneInput');
            const msgArea = document.getElementById('msgArea');

            const name = nameInput.value.trim();
            const phone = phoneInput.value.trim();

            msgArea.style.display = 'none';
            msgArea.className = 'error';

            if (!name) {
                alert("이름은 필수입니다!");
                nameInput.focus();
                return;
            }

            try {
                // 1. 빈 번호(Gap) 찾기 로직
                const { data: users, error } = await fetch(`${SUPABASE_URL}/rest/v1/users?select=user_no&order=user_no.asc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                }).then(res => res.json().then(data => ({ data, error: !res.ok ? data : null })));

                if (error) throw new Error("순번 조회 실패");

                let nextNo = 1;
                // user_no만 추출한 배열 생성
                const userNos = users.map(u => u.user_no).filter(n => n !== null); // null 체크

                // 빈 번호 찾기 (1부터 시작해서 연속되지 않는 숫자 찾기)
                for (let i = 0; i < userNos.length; i++) {
                    if (userNos[i] !== i + 1) {
                        nextNo = i + 1;
                        break;
                    }
                    // 마지막 요소까지 왔다면 그 다음 번호
                    if (i === userNos.length - 1) {
                        nextNo = userNos.length + 1;
                    }
                }
                // 목록이 비어 있으면 nextNo는 1

                // 2. 사용자 등록 (계산된 nextNo 사용)
                const response = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        user_no: nextNo,
                        name: name,
                        phone_number: phone
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error("등록 실패: " + (err.message || response.statusText));
                }

                const result = await response.json();
                const newUser = result[0];

                alert(`등록 성공! 🎉\n순번: ${newUser.user_no}번\n이름: ${newUser.name}`);

                // 부모창 새로고침 (선택)
                if (window.opener && !window.opener.closed) {
                    // 부모창 코드에 따라 새로고침하거나 검색 함수 호출 가능
                    // window.opener.location.reload(); 
                }
                window.close();

            } catch (error) {
                console.error(error);
                msgArea.innerHTML = "등록 중 오류가 발생했어요.<br>" + error.message;
                msgArea.style.display = 'block';
            }
        }
    </script>

</body>

</html>
